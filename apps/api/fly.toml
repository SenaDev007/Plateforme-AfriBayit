# AfriBayit API — Fly.io configuration
app = "afribayit-api"
primary_region = "cdg"  # Paris — closest to West Africa

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  NODE_ENV = "production"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
