      <stop offset="0%" stop-color="#001a4d"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold top bar -->
